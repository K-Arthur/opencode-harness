name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/extension.js || { echo "Missing dist/extension.js"; exit 1; }
          test -f dist/chat/webview/main.js || { echo "Missing dist/chat/webview/main.js"; exit 1; }
          test -f dist/chat/webview/styles.css || { echo "Missing dist/chat/webview/styles.css"; exit 1; }
          echo "All build artifacts verified"

      # The gate measures the PRODUCTION (minified) build. The previous inline
      # check ran against `npm run build` (dev, unminified ~840KB/1.2MB) and so
      # never reflected real bundle sizes. Build --production, then defer to the
      # single source of truth (scripts/check-bundle-size.mjs).
      - name: Check bundle sizes (production)
        run: |
          node esbuild.js --production
          node scripts/check-bundle-size.mjs

      - name: Unit tests
        run: npm run test:unit

      - name: Check architecture layer rules
        run: node scripts/check-architecture.mjs

      - name: Lint (ESLint)
        run: npx eslint src/

      - name: Security audit
        run: npm audit --audit-level=high || echo "Vulnerabilities found — review npm audit output above"

  integration:
    runs-on: ubuntu-latest
    needs: typecheck-and-unit
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install system dependencies (xvfb for headless VS Code)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon-x11-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Integration tests (VS Code Extension Dev Host)
        run: xvfb-run --auto-servernum npm run test:integration
        timeout-minutes: 5

  visual:
    runs-on: ubuntu-latest
    needs: typecheck-and-unit
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          rm -rf ~/.cache/ms-playwright
          npx playwright install --with-deps chromium --force

      - name: Build extension
        run: npm run build

      - name: Serve webview and run visual tests
        run: npx playwright test --project=chromium --project=chromium-webview
        timeout-minutes: 20

  screenshots-verify:
    runs-on: ubuntu-latest
    needs: typecheck-and-unit
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          rm -rf ~/.cache/ms-playwright
          npx playwright install --with-deps chromium --force

      - name: Build extension
        run: npm run build

      - name: Validate fixture content accuracy
        run: npm run screenshots:validate

      - name: Verify screenshots against baselines
        run: npm run screenshots:verify
        timeout-minutes: 5

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: test-results/
