name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/extension.js || { echo "Missing dist/extension.js"; exit 1; }
          test -f dist/chat/webview/main.js || { echo "Missing dist/chat/webview/main.js"; exit 1; }
          test -f dist/chat/webview/styles.css || { echo "Missing dist/chat/webview/styles.css"; exit 1; }
          echo "All build artifacts verified"

      - name: Check bundle sizes
        run: |
          node -e "
          const fs = require('fs');
          const extSize = fs.statSync('dist/extension.js').size;
          const webSize = fs.statSync('dist/chat/webview/main.js').size;
          console.log('Extension bundle: ' + (extSize / 1024).toFixed(1) + ' KB');
          console.log('Webview bundle:  ' + (webSize / 1024).toFixed(1) + ' KB');
          if (extSize > 512000) { console.error('Extension bundle exceeds 500KB limit!'); process.exit(1); }
          if (webSize > 614400) { console.error('Webview bundle exceeds 600KB limit!'); process.exit(1); }
          console.log('Bundle sizes within limits');
          "

      - name: Unit tests
        run: npm run test:unit

      - name: Check architecture layer rules
        run: node scripts/check-architecture.mjs

      - name: Lint (ESLint)
        run: npx eslint src/ || echo "ESLint not fully configured yet"

  integration:
    runs-on: ubuntu-latest
    needs: typecheck-and-unit
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install system dependencies (xvfb for headless VS Code)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon-x11-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Integration tests (VS Code Extension Dev Host)
        run: xvfb-run --auto-servernum npm run test:integration
        timeout-minutes: 5

  visual:
    runs-on: ubuntu-latest
    needs: typecheck-and-unit
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Serve webview and run visual tests
        run: npx playwright test
        timeout-minutes: 5
