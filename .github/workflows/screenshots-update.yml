name: Update Screenshot Baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          rm -rf ~/.cache/ms-playwright
          npx playwright install --with-deps chromium --force

      - name: Build extension
        run: node esbuild.js --production

      - name: Validate fixtures
        run: npm run screenshots:validate

      - name: Generate screenshots
        run: npx playwright test --project=screenshots-generate --update-snapshots --retries 2

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/screenshots/dark/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -S -m "chore(screenshots): regenerate baselines from CI"
            git push
          fi
