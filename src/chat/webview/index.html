    <div id="context-bar" class="hidden">
      <div id="context-chips"></div>

        <h2>OpenCode</h2>
        <p>I can read, edit, and debug your codebase. Try one of these to get started:</p>
        <div class="welcome-suggestions">
          <button class="suggestion-btn" data-prompt="Explain the current file structure">Explain the current file structure</button>
          <button class="suggestion-btn" data-prompt="Find potential bugs in the codebase">Find potential bugs in the codebase</button>
          <button class="suggestion-btn" data-prompt="Refactor this project to use better patterns">Refactor this project to use better patterns</button>
          <button class="suggestion-btn" data-prompt="Generate tests for the main module">Generate tests for the main module</button>
        </div>
      </div>
    </div>

    <div id="typing-indicator" class="hidden">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="typing-text" id="typing-label">Thinking...</span>
    </div>

    <div id="input-area">
      <div id="input-toolbar">
        <div id="mode-selector">
          <button class="mode-btn active" data-mode="normal" title="Requires approval for each file change and command">Normal</button>
          <button class="mode-btn" data-mode="plan" title="Analyzes and plans changes without writing files">Plan</button>
          <button class="mode-btn" data-mode="acceptEdits" title="Applies changes automatically without asking">Auto</button>
        </div>
        <div id="context-usage" class="hidden">
          <span id="context-label">Context</span>
          <div class="context-bar-track">
            <div id="context-bar-fill"></div>
          </div>
        </div>
      </div>
      <div id="input-row">
        <div id="input-wrapper">
          <textarea id="prompt-input" rows="1" placeholder="Ask OpenCode to edit, debug, or explain... (Cmd/Ctrl + Enter to send)"></textarea>
          <div id="mention-dropdown" class="dropdown hidden"></div>
        </div>
        <button id="send-btn" class="input-action-btn" title="Send" aria-label="Send">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
            <path d="M1.5 1.5L15 8 1.5 14.5V9.533L8.5 8 1.5 6.467V1.5z"/>
          </svg>
        </button>
        <button id="abort-btn" class="input-action-btn hidden" title="Stop" aria-label="Stop">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
            <path d="M3 3h10v10H3V3z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
