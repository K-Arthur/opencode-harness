<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none';">
  <title>OpenCode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#prompt-input" class="skip-link">Skip to input</a>

  <div id="app">
    <header id="chat-header">
      <div class="header-row">
        <div class="header-left">
          <div class="oc-logo-wrapper">
            <svg class="oc-logo" width="20" height="20" viewBox="0 0 480 600" fill="none" aria-hidden="true">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0h480v600H0V0zm120 120h240v360H120V120z" fill="currentColor"/>
            </svg>
            <div id="agent-status-led" class="status-led idle"></div>
          </div>
          <div class="header-info">
            <span class="header-title">OpenCode</span>
            <span id="agent-status-text" class="status-text" aria-live="polite" aria-atomic="true">SYSTEM READY</span>
          </div>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="history-btn" title="Session history" aria-label="Session history">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </button>
          <button class="icon-btn" id="new-tab-btn" title="New session (Ctrl+T)" aria-label="New session">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button class="icon-btn" id="mcp-btn" title="Manage MCP servers" aria-label="Manage MCP servers">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
              <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
              <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
              <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
            </svg>
          </button>
          <button class="icon-btn" id="settings-btn" title="OpenCode settings" aria-label="Open settings">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div id="tab-container">
      <div id="tab-bar" role="tablist" aria-label="Sessions">
      </div>
      <div id="tab-panels">
      </div>
    </div>

    <!-- Standalone welcome view — shown when no sessions exist -->
    <div id="welcome-view" class="welcome-view">
      <div class="welcome-container">
        <div class="welcome-header">
          <div class="welcome-brand" aria-hidden="true">
            <img class="welcome-wordmark" src="media/opencode-wordmark-dark.svg" width="120" height="auto" alt="OpenCode" aria-hidden="true">
          </div>
          <p class="welcome-tagline">Your intelligent coding assistant</p>
        </div>
        <div class="prompt-starters">
          <button class="prompt-starter" data-prompt="Explain the current file structure">
            <span class="prompt-starter-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
            <span class="prompt-starter-text">
              <span class="prompt-starter-label">Explain the current file structure</span>
              <span class="prompt-starter-desc">Get a high-level overview of how this project is organised</span>
            </span>
          </button>
          <button class="prompt-starter" data-prompt="Find potential bugs in the codebase">
            <span class="prompt-starter-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 6"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9 4 11.27"/><path d="M17.47 9 20 11.27"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M6.53 17 4 14.73"/><path d="M17.47 17 20 14.73"/></svg></span>
            <span class="prompt-starter-text">
              <span class="prompt-starter-label">Find potential bugs</span>
              <span class="prompt-starter-desc">Scan the codebase for common issues and anti-patterns</span>
            </span>
          </button>
          <button class="prompt-starter" data-prompt="Refactor this project to use better patterns">
            <span class="prompt-starter-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg></span>
            <span class="prompt-starter-text">
              <span class="prompt-starter-label">Refactor to better patterns</span>
              <span class="prompt-starter-desc">Modernise the code with cleaner architecture and idioms</span>
            </span>
          </button>
          <button class="prompt-starter" data-prompt="Generate tests for the main module">
            <span class="prompt-starter-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg></span>
            <span class="prompt-starter-text">
              <span class="prompt-starter-label">Generate tests</span>
              <span class="prompt-starter-desc">Create unit tests for the core modules in this project</span>
            </span>
          </button>
        </div>
        <p class="welcome-or-divider">or type a message below</p>
        <div class="recent-sessions" id="welcome-recent-sessions"></div>
      </div>
    </div>

    <div id="chat-search-bar" class="chat-search-bar hidden">
      <input type="text" id="chat-search-input" placeholder="Search messages..." aria-label="Search messages">
      <span id="chat-search-count" class="chat-search-count"></span>
      <button id="chat-search-prev" class="icon-btn" title="Previous match (Shift+Enter)" aria-label="Previous match">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
      </button>
      <button id="chat-search-next" class="icon-btn" title="Next match (Enter)" aria-label="Next match">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <button id="chat-search-close" class="icon-btn" title="Close search (Escape)" aria-label="Close search">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
      </button>
    </div>

    <div id="context-bar" class="hidden">
      <div id="context-chips"></div>
      <div id="context-usage" class="hidden">
        <progress id="context-progress-bar" max="100" value="0"></progress>
        <span id="context-label" class="context-usage-label">0%</span>
      </div>
    </div>

    <div id="input-area">
      <div id="model-dropdown-container" class="hidden"></div>
      <div id="variant-dropdown-container" class="hidden"></div>
      <div id="input-wrapper">
        <textarea id="prompt-input" rows="1" placeholder="Ask OpenCode anything…" aria-label="Message input"></textarea>
        <div id="mention-dropdown" class="dropdown hidden"></div>
        <div id="slash-autocomplete" class="slash-autocomplete hidden"></div>
      </div>

      <div id="input-bottom-bar">
        <div class="bottom-bar-left">
          <button class="icon-btn" id="mention-btn" title="Add context (@)" aria-label="Add context mention">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
            </svg>
          </button>
          <button class="icon-btn" id="attach-btn" title="Attach files" aria-label="Attach files">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 7.5a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v7a6 6 0 0 1-12 0v-4"/>
              <path d="M12 15V7.5"/>
            </svg>
          </button>
        </div>

        <div class="bottom-bar-right">
        <div class="mode-toggle-group" id="mode-toggle-group" role="radiogroup" aria-label="Session mode">
                <button class="mode-btn" id="mode-plan-btn" role="radio" aria-checked="false" data-mode="plan">Plan</button>
                <button class="mode-btn" id="mode-auto-btn" role="radio" aria-checked="false" data-mode="auto">Auto</button>
                <button class="mode-btn active" id="mode-build-btn" role="radio" aria-checked="true" data-mode="build">Normal</button>
              </div>
           <button class="model-selector-btn" id="model-selector-btn" title="Select model" aria-haspopup="listbox" aria-expanded="false">
             <span id="model-label">Default</span>
             <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
               <path d="m6 9 6 6 6-6"/>
             </svg>
           </button>
           <button class="variant-selector-btn" id="variant-selector-btn" title="Select thinking level" aria-haspopup="listbox" aria-expanded="false">
             <span id="variant-label">Default</span>
             <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
               <path d="m6 9 6 6 6-6"/>
             </svg>
           </button>
           <button class="send-btn" id="send-btn" title="Send" aria-label="Send message">
            <span class="send-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m5 12 7-7 7 7"/>
                <path d="M12 5v14"/>
              </svg>
            </span>
            <span class="stop-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="6" y="6" width="12" height="12" rx="2"/>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </div>

    <div id="error-boundary" class="hidden" role="alert"></div>
  </div>

  <!-- Model Manager Panel -->
  <div id="model-manager-panel" class="model-manager-overlay hidden" role="dialog" aria-modal="true" aria-label="Manage models">
    <div class="model-manager-content">
      <div class="model-manager-header">
        <div class="model-manager-header-text">
          <h2>Manage models</h2>
          <p>Customize which models appear in the model selector.</p>
        </div>
        <button class="model-manager-connect-btn" id="model-manager-connect" aria-label="Connect provider">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>Connect provider</span>
        </button>
      </div>
      <div class="model-manager-search-wrapper">
        <svg class="model-manager-search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="model-manager-search" class="model-manager-search" placeholder="Search models" aria-label="Search models">
      </div>
      <div class="model-manager-list" id="model-manager-list"></div>
      <button class="model-manager-close" id="model-manager-close" aria-label="Close model manager">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18"/>
          <path d="M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Session History Modal -->
  <div id="session-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Session history">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Session History</h3>
        <button class="modal-close-btn" id="session-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="session-modal-body">
        <div class="modal-empty">Loading sessions...</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
