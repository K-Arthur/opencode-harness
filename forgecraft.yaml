      decidedAt: '2026-05-04'
      decidedBy: scaffold
    - step: constitution
      required: true
      rationale: >-
        All projects require an architectural constitution (CLAUDE.md); it is the operative grammar that constrains
        every AI coding session.
      decidedAt: '2026-05-04'
      decidedBy: scaffold
    - step: adrs
      required: true
      rationale: >-
        Library design decisions (API surface, versioning strategy, compatibility guarantees) must be recorded in
